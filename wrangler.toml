name = "monad-x-trade-assistant"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["* * * * *"]

[[durable_objects.bindings]]
name = "TRADE_COORDINATOR"
class_name = "TradeCoordinator"

[[durable_objects.bindings]]
name = "USER_REGISTRY"
class_name = "UserRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TradeCoordinator"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserRegistry"]

[vars]
TRADING_ENABLED = "true"
TRADE_DRY_RUN = "false"
MAX_MON_PER_TRADE = "10"
MAX_MON_PER_DAY = "30"
MAX_TRADES_PER_HOUR = "3"
DEFAULT_SLIPPAGE_BPS = "300"
MAX_PRICE_IMPACT_BPS = "1000"
TRADE_DEADLINE_SECONDS = "120"
MIN_WALLET_RESERVE_MON = "1"
MONAD_CHAIN_ID = "143"
MONAD_RPC_URL = "https://rpc.monad.xyz"
MONAD_RPC_FALLBACK_URLS = "https://rpc1.monad.xyz,https://rpc2.monad.xyz,https://rpc3.monad.xyz,https://monad-mainnet.drpc.org"
MONAD_EXPLORER_TX_URL = "https://monadvision.com/tx/"
NADFUN_LENS_ADDRESS = "0x7e78A8DE94f21804F7a17F4E8BF9EC2c872187ea"
# Nad.fun (bonding + DEX + V2) + Flap Portal v5.1.2 + Uniswap V2 Router02 + Uniswap V3 SwapRouter02
NADFUN_ALLOWED_ROUTER_ADDRESSES = "0x6F6B8F1a20703309951a5127c45B49b1CD981A22,0x0B79d71AE99528D1dB24A4148b5f4F865cc2b137,0x8986C8fD44eb85294A725a7e61AF35E76bA26F91,0x30e8ee7b5881bf2E158A0514f2150aabe2c68b23,0x4b2ab38dbf28d31d467aa8993f6c2585981d6804,0xfe31f71c1b106eac32f1a19239c9a9a72ddfb900"
X_BOT_USERNAME = "monexmonad"
